name: Autograding

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  autograde:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-timeout psutil

      - name: Run tests
        run: |
          cd tests
          python -m pytest --timeout=10 --tb=short

      - name: Calculate score
        run: |
          python scripts/calculate_score.py

      - name: Commit and push score
        run: |
          git config --global user.name 'GitHub Classroom'
          git config --global user.email 'classroom@github.com'
          git add score.json
          git commit -m "Add autograding score" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME} || echo "Failed to push score"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}